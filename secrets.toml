# IMPORTANT:
# - This file MUST live at: <project>/.streamlit/secrets.toml (not inside mhud/)
# - Do NOT paste raw JSON like you did before; use TOML keys below.
# - Keep this file private.

[gcp_service_account]
type = "service_account"
project_id = "YOUR_PROJECT_ID"
private_key_id = "YOUR_PRIVATE_KEY_ID"
private_key = "-----BEGIN PRIVATE KEY-----\nPASTE_YOUR_PRIVATE_KEY_HERE\n-----END PRIVATE KEY-----\n"
client_email = "YOUR_SERVICE_ACCOUNT_EMAIL"
client_id = "YOUR_CLIENT_ID"
auth_uri = "https://accounts.google.com/o/oauth2/auth"
token_uri = "https://oauth2.googleapis.com/token"
auth_provider_x509_cert_url = "https://www.googleapis.com/oauth2/v1/certs"
client_x509_cert_url = "YOUR_CLIENT_X509_CERT_URL"

[sheets]
# The Google Spreadsheet ID (from the URL) that will store your data
spreadsheet_id = "YOUR_SPREADSHEET_ID"

[auth]
# Login accounts (RBAC):
# - role = "Admin"  -> full access (dashboard, tab builder, exports)
# - role = "User"   -> data entry only
#
# IMPORTANT: Change these passwords before production use.
users = [
  { username = "admin", password = "Admin@2026#ChangeMe_NOW", role = "Admin" },
  { username = "user1", password = "User@2026#ChangeMe_NOW", role = "User" },
]

